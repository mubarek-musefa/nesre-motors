<style>
  :root {
    --primary: #E65100;
    --primary-dark: #BF360C;
    --primary-light: #FFF3E0;
    --accent: #FF8F00;
    --bg: #F5F5F5;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #757575;
    --border: #E0E0E0;
    --success: #2E7D32;
    --input-bg: #FAFAFA;
    --header-h: 64px;
    --footer-h: 80px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans Ethiopic', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: calc(var(--footer-h) + 16px);
  }

  /* HEADER */
  .header {
    background: var(--primary);
    color: #fff;
    padding: 0 16px;
    height: var(--header-h);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-text h1 { font-size: 16px; font-weight: 700; }
  .header-text p { font-size: 11px; opacity: 0.85; margin-top: 1px; }

  /* CUSTOMER INFO */
  .section-card {
    background: var(--card);
    margin: 12px 12px 0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .section-title {
    background: var(--primary);
    color: #fff;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .customer-fields { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .field-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
  .field-input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--primary); }

  /* CATEGORY */
  .category-block {
    background: var(--card);
    margin: 10px 12px 0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    background: var(--primary-light);
    border-left: 4px solid var(--primary);
  }
  .category-header-left { display: flex; align-items: center; gap: 10px; }
  .category-header h3 { font-size: 13px; font-weight: 700; color: var(--primary-dark); }
  .category-header .count {
    font-size: 11px;
    background: var(--primary);
    color: #fff;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 600;
  }
  .chevron {
    width: 20px; height: 20px;
    border-right: 2.5px solid var(--primary);
    border-bottom: 2.5px solid var(--primary);
    transform: rotate(45deg);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-right: 4px;
  }
  .chevron.open { transform: rotate(-135deg); }
  .category-body { display: none; }
  .category-body.open { display: block; }

  /* MODEL GROUP */
  .model-group { border-top: 1px solid var(--border); }
  .model-label {
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    background: #FAFAFA;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* PRODUCT ROW */
  .product-row {
    display: flex;
    align-items: center;
    padding: 9px 14px;
    border-top: 1px solid var(--border);
    gap: 8px;
    transition: background 0.15s;
  }
  .product-row:hover { background: #FFFBF7; }
  .product-row.has-qty { background: #FFF8F0; }
  .product-num {
    font-size: 10px;
    color: var(--text-muted);
    min-width: 22px;
    font-weight: 600;
  }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .product-price { font-size: 11px; color: var(--primary); font-weight: 600; margin-top: 2px; }
  .product-model-tag {
    font-size: 10px;
    color: var(--text-muted);
    background: #F0F0F0;
    padding: 1px 5px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 2px;
  }

  /* QTY CONTROL */
  .qty-control { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .qty-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: var(--border);
    color: var(--text);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .qty-btn:active { transform: scale(0.88); }
  .qty-btn.plus { background: var(--primary); color: #fff; }
  .qty-btn.minus { background: #EEE; }
  .qty-input {
    width: 36px;
    text-align: center;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 4px 2px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    background: #fff;
    outline: none;
  }
  .qty-input:focus { border-color: var(--primary); }

  /* FOOTER */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--footer-h);
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 12px;
    z-index: 100;
    box-shadow: 0 -3px 12px rgba(0,0,0,0.1);
  }
  .total-block { flex: 1; }
  .total-label { font-size: 11px; color: var(--text-muted); }
  .total-amount { font-size: 20px; font-weight: 700; color: var(--primary-dark); }
  .submit-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 22px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .submit-btn:active { transform: scale(0.96); background: var(--primary-dark); }
  .submit-btn:disabled { background: #CCC; cursor: not-allowed; }

  /* EMPTY STATE */
  .empty-notice {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 12px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: #333;
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SUCCESS */
  .success-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 300;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .success-overlay.show { opacity: 1; pointer-events: all; }
  .success-card {
    background: #fff;
    border-radius: 20px;
    padding: 30px 24px;
    margin: 20px;
    text-align: center;
    transform: scale(0.8); transition: transform 0.3s;
  }
  .success-overlay.show .success-card { transform: scale(1); }
  .success-icon { font-size: 52px; margin-bottom: 12px; }
  .success-card h2 { font-size: 18px; color: var(--success); margin-bottom: 8px; }
  .success-card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  .bottom-space { height: 12px; }
</style>
</head>

// ─── STATE ───────────────────────────────────────────────────────
const quantities = {}; // id -> qty

// ─── INIT TELEGRAM ───────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

// ─── BUILD UI ────────────────────────────────────────────────────
function groupByModel(items) {
  const groups = {};
  items.forEach(item => {
    if (!groups[item.model]) groups[item.model] = [];
    groups[item.model].push(item);
  });
  return groups;
}

function buildUI() {
  const container = document.getElementById('products-container');
  CATEGORIES.forEach((cat, ci) => {
    const block = document.createElement('div');
    block.className = 'category-block';

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <div class="category-header-left">
        <div>
          <h3>${cat.name}</h3>
        </div>
        <span class="count">${cat.items.length} ዓይነት</span>
      </div>
      <div class="chevron" id="chevron-${ci}"></div>
    `;
    header.onclick = () => toggleCategory(ci);

    const body = document.createElement('div');
    body.className = 'category-body';
    body.id = `cat-body-${ci}`;

    const groups = groupByModel(cat.items);
    Object.entries(groups).forEach(([model, items]) => {
      const mg = document.createElement('div');
      mg.className = 'model-group';
      if (model !== '—') {
        mg.innerHTML = `<div class="model-label">📌 ${model}</div>`;
      }
      items.forEach(item => {
        mg.appendChild(buildProductRow(item));
      });
      body.appendChild(mg);
    });

    block.appendChild(header);
    block.appendChild(body);
    container.appendChild(block);
  });

  // Open first category by default
  toggleCategory(0);
}

function buildProductRow(item) {
  const row = document.createElement('div');
  row.className = 'product-row';
  row.id = `row-${item.id}`;
  row.innerHTML = `
    <span class="product-num">${item.id}</span>
    <div class="product-info">
      <div class="product-name">${item.name}</div>
      <div class="product-price">${item.price.toLocaleString()} ብር</div>
    </div>
    <div class="qty-control">
      <button class="qty-btn minus" onclick="changeQty(${item.id}, -1, ${item.price})">−</button>
      <input class="qty-input" type="number" min="0" value="0" id="qty-${item.id}"
        onchange="setQty(${item.id}, this.value, ${item.price})"
        oninput="setQty(${item.id}, this.value, ${item.price})"/>
      <button class="qty-btn plus" onclick="changeQty(${item.id}, 1, ${item.price})">+</button>
    </div>
  `;
  return row;
}

function toggleCategory(ci) {
  const body = document.getElementById(`cat-body-${ci}`);
  const chevron = document.getElementById(`chevron-${ci}`);
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

// ─── QTY LOGIC ───────────────────────────────────────────────────
function changeQty(id, delta, price) {
  const input = document.getElementById(`qty-${id}`);
  let val = (quantities[id] || 0) + delta;
  if (val < 0) val = 0;
  quantities[id] = val;
  input.value = val;
  updateRow(id);
  updateTotal();
}

function setQty(id, rawVal, price) {
  let val = parseInt(rawVal) || 0;
  if (val < 0) val = 0;
  quantities[id] = val;
  document.getElementById(`qty-${id}`).value = val;
  updateRow(id);
  updateTotal();
}

function updateRow(id) {
  const row = document.getElementById(`row-${id}`);
  if (quantities[id] > 0) row.classList.add('has-qty');
  else row.classList.remove('has-qty');
}

function updateTotal() {
  let total = 0;
  CATEGORIES.forEach(cat => {
    cat.items.forEach(item => {
      total += (quantities[item.id] || 0) * item.price;
    });
  });
  document.getElementById('grand-total').textContent =
    total.toLocaleString() + ' ብር';
}

// ─── SUBMIT ───────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function submitOrder() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();

  if (!name) { showToast('⚠️ እባክዎ ስምዎን ያስገቡ'); return; }
  if (!phone) { showToast('⚠️ እባክዎ ስልክ ቁጥርዎን ያስገቡ'); return; }

  const ordered = [];
  CATEGORIES.forEach(cat => {
    cat.items.forEach(item => {
      if ((quantities[item.id] || 0) > 0) {
        ordered.push({
          id: item.id,
          model: item.model,
          name: item.name,
          price: item.price,
          qty: quantities[item.id],
          subtotal: quantities[item.id] * item.price
        });
      }
    });
  });

  if (ordered.length === 0) {
    showToast('⚠️ ቢያንስ አንድ እቃ ይምረጡ');
    return;
  }

  const total = ordered.reduce((s, i) => s + i.subtotal, 0);

  const payload = {
    customer: { name, phone },
    items: ordered,
    total,
    submitted_at: new Date().toISOString()
  };

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '⏳ እየተላከ...';

  // Send to backend (Google Apps Script URL — to be configured)
  const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwMHXQwUjpN9GTaYR4b__q_ouJmU-RcVZMMXrYnAFrJOQF_R-H6KY3ufrm0rjUjBdP4/exec';

  const send = (url) => {
    if (url && url !== 'YOUR_GOOGLE_APPS_SCRIPT_URL') {
      return fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
    }
    return new Promise(res => setTimeout(res, 800));
  };

  send(BACKEND_URL)
    .then(() => {
      // Also notify via Telegram if available
      if (tg && tg.sendData) {
        try { tg.sendData(JSON.stringify(payload)); } catch(e) {}
      }
      document.getElementById('success-msg').innerHTML =
        `<strong>${name}</strong> — ትዕዛዝዎ ደርሷል!<br/>
         <span style="color:#E65100;font-weight:700">${total.toLocaleString()} ብር</span><br/><br/>
         በቅርቡ እናነጋግርዎታለን 📞`;
      document.getElementById('success-overlay').classList.add('show');
      if (tg && tg.close) setTimeout(() => tg.close(), 3000);
    })
    .catch(() => {
      btn.disabled = false;
      btn.textContent = '📤 ትዕዛዝ ላክ';
      showToast('❌ ችግር ተፈጠረ። እንደገና ይሞክሩ');
    });
}
